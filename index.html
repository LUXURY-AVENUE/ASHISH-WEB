<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Gallery | Developer Ashish</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #05070a;
            --sidebar-bg: #0f1217;
            --accent: #00a3ff;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            overflow: hidden;
        }

        .header {
            background: #111;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #333;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--accent);
            font-size: 14px;
        }

        .main-layout {
            display: flex;
            height: calc(100vh - 50px);
        }

        /* Player Section */
        .player-container {
            flex: 3;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* YouTube Title/Logo Hide Trick */
        .iframe-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
        }

        iframe {
            width: 100%;
            height: calc(100% + 120px); /* Extra height to hide top/bottom bars */
            margin-top: -60px; /* Hide YouTube Top bar */
            border: none;
        }

        /* Sidebar Section */
        .sidebar {
            flex: 1;
            background: var(--sidebar-bg);
            border-left: 1px solid #1e293b;
            overflow-y: auto;
            padding: 15px;
        }

        .sidebar h3 {
            font-size: 16px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        .video-card {
            display: flex;
            gap: 10px;
            background: #1a1e26;
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .video-card:hover {
            border-color: var(--accent);
            background: #242b38;
        }

        .video-card img {
            width: 100px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
        }

        .video-card .info {
            font-size: 12px;
            line-height: 1.4;
        }

        .video-card .info b {
            display: block;
            color: var(--accent);
            margin-bottom: 4px;
        }

        /* Mobile View */
        @media (max-width: 800px) {
            .main-layout { flex-direction: column; }
            .sidebar { height: 300px; }
            iframe { margin-top: -45px; height: calc(100% + 90px); }
        }
    </style>
</head>
<body>

    <div class="header">DEVELOPER BY ASHISH</div>

    <div class="main-layout">
        <!-- Main Player Area -->
        <div class="player-container">
            <div class="iframe-wrapper">
                <iframe id="video-frame" 
                    src="https://www.youtube.com/embed/videoseries?list=PL52KVnVncFkbvTKCj2R6h7kQz0lOGV9Hi&modestbranding=1&rel=0&showinfo=0&controls=1&vq=hd1080" 
                    allow="autoplay; encrypted-media" allowfullscreen>
                </iframe>
            </div>
        </div>

        <!-- Sidebar Playlist Area -->
        <div class="sidebar">
            <h3>Video Library</h3>

            <!-- यहाँ आप अपने पसंदीदा वीडियो की लिस्ट डाल सकते हैं -->
            <div id="video-list">
                
                <!-- Playlist 1 Group -->
                <div class="video-card" onclick="playThis('PL52KVnVncFkbV38wQ4FNz_LjOSkQu9p5n')">
                    <img src="https://img.youtube.com/vi/PL52KVnVncFkbV38wQ4FNz_LjOSkQu9p5n/mqdefault.jpg">
                    <div class="info">
                        <b>Memory Collection 1</b>
                        <span>Click to play full playlist</span>
                    </div>
                </div>

                <!-- Playlist 2 Group -->
                <div class="video-card" onclick="playThis('PL52KVnVncFkbRx8PnnywcuZTfwxJhtl-D')">
                    <img src="https://img.youtube.com/vi/PL52KVnVncFkbRx8PnnywcuZTfwxJhtl-D/mqdefault.jpg">
                    <div class="info">
                        <b>Memory Collection 2</b>
                        <span>Click to play full playlist</span>
                    </div>
                </div>

                <!-- Playlist 3 Group -->
                <div class="video-card" onclick="playThis('PL52KVnVncFkbvTKCj2R6h7kQz0lOGV9Hi')">
                    <img src="https://img.youtube.com/vi/PL52KVnVncFkbvTKCj2R6h7kQz0lOGV9Hi/mqdefault.jpg">
                    <div class="info">
                        <b>Memory Collection 3</b>
                        <span>Click to play full playlist</span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        function playThis(id) {
            const frame = document.getElementById('video-frame');
            // vq=hd1080 set to ensure high quality
            frame.src = "https://www.youtube.com/embed/videoseries?list=" + id + "&modestbranding=1&rel=0&showinfo=0&controls=1&vq=hd1080&autoplay=1";
        }
    </script>

</body>
</html>
