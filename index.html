<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Video Portal | Developer Ashish</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #05070a;
            --card-dark: #0f1217;
            --accent-blue: #00a3ff;
            --text-gray: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Developer Header */
        .dev-header {
            background: rgba(15, 18, 23, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #1e293b;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .dev-header h2 {
            margin: 0;
            font-size: 12px;
            letter-spacing: 4px;
            color: var(--accent-blue);
            text-transform: uppercase;
        }

        /* Tab System */
        .tab-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            padding: 0 10px;
        }

        .tab-btn {
            background: var(--card-dark);
            border: 1px solid #1e293b;
            color: var(--text-gray);
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        .tab-btn.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
            box-shadow: 0 0 20px rgba(0, 163, 255, 0.3);
        }

        /* Player Section */
        .player-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .video-box {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border: 1px solid #1e293b;
        }

        /* Youtube Interface hiding trick */
        .video-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Overlay to hide top info of YouTube */
        .player-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: linear-gradient(to bottom, rgba(5,7,10,1), transparent);
            pointer-events: none;
            z-index: 10;
        }

        .footer-branding {
            text-align: center;
            padding: 50px;
            color: #334155;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header class="dev-header">
        <h2>DEVELOPER BY ASHISH</h2>
    </header>

    <div class="tab-container">
        <button class="tab-btn active" onclick="switchPlaylist('PL52KVnVncFkbV38wQ4FNz_LjOSkQu9p5n', this)">Memory 1</button>
        <button class="tab-btn" onclick="switchPlaylist('PL52KVnVncFkbRx8PnnywcuZTfwxJhtl-D', this)">Memory 2</button>
        <button class="tab-btn" onclick="switchPlaylist('PL52KVnVncFkbvTKCj2R6h7kQz0lOGV9Hi', this)">Memory 3</button>
    </div>

    <div class="player-wrapper">
        <div class="video-box">
            <div class="player-overlay"></div>
            <!-- Modestbranding, rel, vq=hd1080 (for Max Resolution), and iv_load_policy used -->
            <iframe id="main-player" 
                src="https://www.youtube.com/embed/videoseries?list=PL52KVnVncFkbV38wQ4FNz_LjOSkQu9p5n&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3&controls=1&vq=hd1080" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

    <div class="footer-branding">
        Designed for a seamless private experience.<br>
        © 2026 Ashish Digital Portfolio
    </div>

    <script>
        function switchPlaylist(id, btn) {
            // Player update with max resolution settings
            const player = document.getElementById('main-player');
            player.src = `https://www.youtube.com/embed/videoseries?list=${id}&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3&controls=1&vq=hd1080`;
            
            // Tab button style update
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>

</body>
</html>
