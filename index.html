<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        .header { text-align: center; padding: 10px; color: #00f2ff; font-size: 12px; }
        
        /* YouTube Hide Logic */
        .viewport { width: 100%; aspect-ratio: 16/9; overflow: hidden; position: relative; background: #000; }
        iframe { 
            position: absolute; 
            top: -65px; /* Title Masking */
            left: -2px; 
            width: calc(100% + 4px); 
            height: calc(100% + 130px); /* Logo Masking */
            border: none; 
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .btn { background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 10px; text-align: center; }
        .active { border-color: #00f2ff; color: #00f2ff; }
    </style>
</head>
<body>
    <div class="header">DEVELOPER BY ASHISH</div>
    
    <div class="viewport">
        <iframe id="player" src="https://www.youtube.com/embed/videoseries?list=PL52KVnVncFkbV38wQ4FNz_LjOSkQu9p5n&modestbranding=1&rel=0&vq=hd1080&controls=1"></iframe>
    </div>

    <div class="grid">
        <div class="btn active" onclick="load('PL52KVnVncFkbV38wQ4FNz_LjOSkQu9p5n', this)">Playlist 1</div>
        <div class="btn" onclick="load('PL52KVnVncFkbRx8PnnywcuZTfwxJhtl-D', this)">Playlist 2</div>
        <div class="btn" onclick="load('PL52KVnVncFkbvTKCj2R6h7kQz0lOGV9Hi', this)">Playlist 3</div>
    </div>

    <script>
        function load(id, el) {
            document.getElementById('player').src = "https://www.youtube.com/embed/videoseries?list=" + id + "&modestbranding=1&rel=0&vq=hd1080&controls=1&autoplay=1";
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
