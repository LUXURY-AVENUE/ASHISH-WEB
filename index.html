<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIFT HUB | Ashish Developer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #020205;
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .brand-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            letter-spacing: 12px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 10px #00d2ff, 0 0 30px #3a7bd5;
            margin-bottom: 10px;
        }

        .brand-header p {
            font-size: 1.2rem;
            letter-spacing: 5px;
            color: #00d2ff;
            text-transform: uppercase;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 210, 255, 0.2);
            padding: 50px 40px;
            border-radius: 25px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
        }

        .label {
            font-size: 0.8rem;
            color: #888;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 20px;
            display: block;
        }

        .value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: #fff;
            margin-top: 5px;
            display: block;
        }

        .highlight {
            color: #00d2ff;
        }

        .btn {
            margin-top: 40px;
            padding: 15px 45px;
            background: transparent;
            border: 2px solid #00d2ff;
            color: #00d2ff;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #00d2ff;
            color: #000;
            box-shadow: 0 0 20px #00d2ff;
        }

        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #444;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="container">
        <div class="brand-header">
            <h1>GIFT HUB</h1>
            <p>Future of Gifting & Interior</p>
        </div>

        <div class="card">
            <span class="label">Lead Developer</span>
            <span class="value highlight">ASHISH DEVELOPER</span>

            <span class="label">Direct Contact</span>
            <span class="value">7530919863</span>

            <span class="label">Official Email</span>
            <span class="value">ashish95823@gmail.com</span>

            <button class="btn" onclick="window.location.href='tel:7530919863'">
                Call Now
            </button>
        </div>

        <footer>
            &copy; 2026 Crafted by Ashish Developer
        </footer>
    </div>

</body>
</html>
