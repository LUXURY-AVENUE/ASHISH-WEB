<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Video Gallery | Ashish</title>
    <!-- Google Fonts for Professional Look -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0a0e14;
            --card-bg: #161b22;
            --accent-color: #58a6ff;
            --text-main: #adbac7;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Top Header - Developer Branding */
        .developer-header {
            background: linear-gradient(90deg, #1f2937, #111827);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #30363d;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .developer-header h2 {
            margin: 0;
            font-size: 14px;
            letter-spacing: 2px;
            color: var(--accent-color);
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Main Video Player Container */
        .main-container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .video-player-box {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid #30363d;
        }

        /* YouTube interface ko mask karne ke liye iframe settings */
        .video-player-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Title Section */
        .gallery-title {
            text-align: left;
            margin-top: 25px;
            border-left: 4px solid var(--accent-color);
            padding-left: 15px;
        }

        .gallery-title h1 {
            font-size: 24px;
            color: #fff;
            margin: 0;
        }

        /* Instructions for Users */
        .info-bar {
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #30363d;
        }

        .dot { height: 8px; width: 8px; background-color: #238636; border-radius: 50%; display: inline-block; }

        footer {
            margin-top: 50px;
            padding: 30px;
            text-align: center;
            font-size: 12px;
            color: #768390;
            border-top: 1px solid #30363d;
        }
    </style>
</head>
<body>

    <!-- Upper Section Branding -->
    <header class="developer-header">
        <h2>DEVELOPER BY ASHISH</h2>
    </header>

    <div class="main-container">
        
        <div class="gallery-title">
            <h1>Special Memories Collection</h1>
        </div>

        <!-- The Video Player -->
        <div class="video-player-box">
            <!-- 
                Custom Parameters Used:
                - modestbranding=1 (YouTube logo kam karne ke liye)
                - rel=0 (Unknown recommendations band karne ke liye)
                - showinfo=0 (Title hatane ke liye)
                - iv_load_policy=3 (Annotations hatane ke liye)
            -->
            <iframe 
                src="https://www.youtube.com/embed/videoseries?list=PL52KVnVncFkbvTKCj2R6h7kQz0lOGV9Hi&modestbranding=1&rel=0&iv_load_policy=3&showinfo=0&controls=1" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>

        <div class="info-bar">
            <span class="dot"></span>
            <span>Live Sync: New videos added to your playlist will appear here automatically.</span>
        </div>

    </div>

    <footer>
        &copy; 2026 Personal Video Portal. All rights reserved. <br>
        Crafted for seamless video experience.
    </footer>

</body>
</html>
