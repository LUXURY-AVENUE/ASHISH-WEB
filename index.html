<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Gallery | Developer Ashish</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --main-bg: #080a0f;
            --card-bg: #121620;
            --accent: #00d2ff;
            --text: #e2e8f0;
        }

        body {
            background-color: var(--main-bg);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* Top Header */
        .header {
            padding: 15px; text-align: center;
            background: rgba(18, 22, 32, 0.9);
            border-bottom: 2px solid var(--accent);
            letter-spacing: 3px; font-weight: 600; font-size: 14px;
            color: var(--accent); text-transform: uppercase;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 0; height: calc(100vh - 50px);
        }

        /* Video Player Area */
        .player-section {
            background: #000; position: relative;
            display: flex; align-items: center; justify-content: center;
        }

        /* YouTube को पूरी तरह मास्क करने के लिए */
        .iframe-container {
            width: 100%; height: 100%; position: relative;
        }

        iframe {
            width: 100%; height: 100%; border: none;
            /* ऊपर के टाइटल को छुपाने के लिए नेगेटिव मार्जिन */
            margin-top: -60px; height: calc(100% + 120px);
        }

        /* Sidebar / Playlist Area */
        .sidebar {
            background: var(--card-bg);
            border-left: 1px solid #2d3748;
            overflow-y: auto; padding: 20px;
        }

        .sidebar h3 {
            font-size: 18px; margin-bottom: 20px; color: var(--accent);
            border-bottom: 1px solid #2d3748; padding-bottom: 10px;
        }

        .video-item {
            background: #1a202c; border-radius: 10px;
            padding: 10px; margin-bottom: 15px;
            cursor: pointer; transition: 0.3s;
            border: 1px solid transparent;
            display: flex; gap: 10px; align-items: center;
        }

        .video-item:hover {
            border-color: var(--accent); background: #2d3748;
        }

        .video-item img {
            width: 100px; border-radius: 5px;
        }

        .video-item p {
            margin: 0; font-size: 13px; font-weight: 400;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
            .sidebar { height: 400px; }
            iframe { margin-top: -45px; height: calc(100% + 90px); }
        }
    </style>
</head>
<body>

    <div class="header">DEVELOPER BY ASHISH</div>

    <div class="main-layout">
        <!-- Main Player -->
        <div class="player-section">
            <div class="iframe-container">
                <iframe id="main-video-player" 
                    src="https://www.youtube.com/embed/videoseries?list=PL52KVnVncFkbvTKCj2R6h7kQz0lOGV9Hi&modestbranding=1&rel=0&controls=1&showinfo=0&iv_load_policy=3&vq=hd1080" 
                    allow="autoplay; encrypted-media" allowfullscreen>
                </iframe>
            </div>
        </div>

        <!-- Sidebar List -->
        <div class="sidebar">
            <h3>Special Collection</h3>
            
            <div id="playlist-items">
                <!-- Playlist 1 -->
                <div class="video-item" onclick="changeVid('PL52KVnVncFkbV38wQ4FNz_LjOSkQu9p5n')">
                    <img src="https://img.youtube.com/vi/PL52KVnVncFkbV38wQ4FNz_LjOSkQu9p5n/mqdefault.jpg" onerror="this.src='https://via.placeholder.com/100x60?text=Memory+1'" />
                    <p>Memory Collection 01</p>
                </div>

                <!-- Playlist 2 -->
                <div class="video-item" onclick="changeVid('PL52KVnVncFkbRx8PnnywcuZTfwxJhtl-D')">
                    <img src="https://img.youtube.com/vi/PL52KVnVncFkbRx8PnnywcuZTfwxJhtl-D/mqdefault.jpg" onerror="this.src='https://via.placeholder.com/100x60?text=Memory+2'" />
                    <p>Memory Collection 02</p>
                </div>

                <!-- Playlist 3 -->
                <div class="video-item" onclick="changeVid('PL52KVnVncFkbvTKCj2R6h7kQz0lOGV9Hi')">
                    <img src="https://img.youtube.com/vi/PL52KVnVncFkbvTKCj2R6h7kQz0lOGV9Hi/mqdefault.jpg" onerror="this.src='https://via.placeholder.com/100x60?text=Memory+3'" />
                    <p>Memory Collection 03</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function changeVid(listId) {
            const player = document.getElementById('main-video-player');
            // vq=hd1080 उच्चतम गुणवत्ता के लिए
            player.src = `https://www.youtube.com/embed/videoseries?list=${listId}&modestbranding=1&rel=0&controls=1&showinfo=0&iv_load_policy=3&vq=hd1080&autoplay=1`;
        }
    </script>

</body>
</html>
